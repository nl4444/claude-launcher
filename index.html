<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claude Launcher</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #1a1a1f;
      --surface2: #24242b;
      --border: #2e2e38;
      --accent: #7c6af7;
      --accent-dim: #4a4270;
      --text: #e8e8f0;
      --text-dim: #888899;
      --green: #4caf7d;
      --red: #e05c5c;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 18px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Session bar ── */
    .session-bar {
      margin: 0 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.3s;
    }

    .session-bar.state-active { border-left-color: var(--green); }
    .session-bar.state-idle   { border-left-color: #f0b429; }
    .session-bar.state-ended,
    .session-bar.state-none   { border-left-color: var(--border); }

    .session-state-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 6px;
    }

    .session-state-badge .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .state-active .badge-dot { background: var(--green); }
    .state-idle   .badge-dot { background: #f0b429; }
    .state-ended  .badge-dot,
    .state-none   .badge-dot { background: var(--text-dim); }

    .session-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .session-app-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .session-url-link {
      display: block;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      margin-bottom: 10px;
    }

    .session-url-link:active { opacity: 0.7; }

    .session-no-url {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .session-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-sm:active { opacity: 0.7; }

    .btn-copy {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-open {
      background: var(--accent);
      color: #fff;
    }

    .session-age {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Waiting indicator */
    .session-waiting {
      display: none;
      font-size: 12px;
      color: var(--accent);
      margin-top: 8px;
    }

    .session-waiting.active { display: flex; align-items: center; gap: 6px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App grid ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      padding: 0 12px 32px;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .app-card.launching {
      border-color: var(--accent-dim);
    }

    .app-star {
      position: absolute;
      top: 10px; right: 10px;
      font-size: 13px;
      color: #f0b429;
    }

    .app-name {
      font-size: 15px;
      font-weight: 600;
      padding-right: 18px;
      line-height: 1.2;
    }

    .app-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .app-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .app-status-dot.active { background: var(--green); }
    .app-status-dot.paused { background: #f0b429; }
    .app-status-dot.idea   { background: var(--text-dim); }

    .btn-launch {
      margin-top: auto;
      width: 100%;
      padding: 9px 0;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn-launch:disabled {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
      cursor: default;
      font-weight: 600;
    }

    .btn-launch:not(:disabled):active { opacity: 0.75; }

    .btn-open-session {
      display: block;
      text-align: center;
      text-decoration: none;
      background: var(--green);
    }

    .card-active { border-color: var(--green); }
    .card-idle   { border-color: #f0b429; }

    /* ── Summary panel ── */
    .btn-summary {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-summary:active { opacity: 0.6; }

    .summary-panel {
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 2px;
    }

    .summary-panel.open { display: block; }

    .summary-text {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .summary-next-steps {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .summary-next-steps li {
      font-size: 11px;
      color: var(--text);
      padding-left: 12px;
      position: relative;
      line-height: 1.4;
    }

    .summary-next-steps li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .summary-updated {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      opacity: 0.7;
    }

    /* Launch state */
    .launch-status {
      font-size: 11px;
      color: var(--accent);
      text-align: center;
      min-height: 16px;
    }

    /* Empty / error states */
    .state-message {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    .copy-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 100;
    }

    .copy-toast.visible { opacity: 1; }

    /* ── PIN overlay ── */
    #pinOverlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .pin-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 240px;
    }

    .pin-box h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    #pinInput {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 8px;
      text-align: center;
      outline: none;
    }

    #pinInput:focus { border-color: var(--accent); }

    #pinSubmit {
      width: 100%;
      padding: 12px 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: opacity 0.15s;
    }

    #pinSubmit:active { opacity: 0.75; }

    #pinError {
      font-size: 13px;
      color: var(--red);
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .pin-shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<!-- PIN overlay -->
<div id="pinOverlay">
  <div class="pin-box">
    <h2>Claude Launcher</h2>
    <input type="password" inputmode="numeric" maxlength="6" id="pinInput" placeholder="••••" autofocus />
    <button id="pinSubmit" onclick="checkPin()">Unlock</button>
    <div id="pinError">Wrong PIN — try again</div>
  </div>
</div>

<header>
  <div class="dot"></div>
  <h1>Claude Launcher</h1>
</header>

<!-- Session bar -->
<div class="session-bar">
  <div class="session-label">Active Session</div>
  <div id="sessionContent">
    <div class="session-no-url">Loading…</div>
  </div>
  <div class="session-waiting" id="sessionWaiting">
    <div class="spinner"></div>
    <span>Waiting for new session URL…</span>
  </div>
</div>

<!-- App list -->
<div class="section-label" id="appsLabel" style="display:none">Apps</div>
<div class="apps-grid" id="appsGrid">
  <div class="state-message">Loading apps…</div>
</div>

<div class="copy-toast" id="copyToast">Copied!</div>

<script>
  // ── Configuration (baked in at deploy time) ──────────────────────────────
  const GIST_USER    = "nl4444";
  const GIST_ID      = "84420b55ed8c8eed82660b5a3803b271";
  const NTFY_TOPIC   = "claude-launcher-0b708e1e";
  const SECRET       = "6838d77aed4681a5";

  const RAW_BASE = `https://gist.githubusercontent.com/${GIST_USER}/${GIST_ID}/raw`;
  const SESSION_URL_FILE  = "session-url.txt";
  const SESSION_NAME_FILE = "session-name.txt";
  const SESSION_PING_FILE = "session-ping.txt";
  const APPS_FILE         = "apps.json";
  const SUMMARIES_FILE    = "summaries.json";

  // Session staleness thresholds (minutes)
  const IDLE_THRESHOLD  = 20;   // > 20 min → Idle
  const ENDED_THRESHOLD = 480;  // > 8 hr  → treat as Ended

  // ── State ─────────────────────────────────────────────────────────────────
  let currentSessionUrl  = null;
  let currentSessionName = null;
  let currentSessionPing = null;  // Date object of last ping
  let sessionFetchedAt   = null;
  let lastApps           = null;
  let summaries          = {};
  let waitingForSession  = false;
  let waitingTimeout     = null;

  // Returns "active" | "idle" | "ended" | "none"
  function getSessionState() {
    if (!currentSessionUrl) return "none";
    if (!currentSessionPing) return "idle";
    const ageMin = (Date.now() - currentSessionPing.getTime()) / 60000;
    if (ageMin > ENDED_THRESHOLD) return "ended";
    if (ageMin > IDLE_THRESHOLD)  return "idle";
    return "active";
  }
  let sessionPollTimer   = null;

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const sessionContent = document.getElementById("sessionContent");
  const sessionWaiting = document.getElementById("sessionWaiting");
  const appsGrid       = document.getElementById("appsGrid");
  const appsLabel      = document.getElementById("appsLabel");
  const copyToast      = document.getElementById("copyToast");

  // ── Utilities ─────────────────────────────────────────────────────────────
  function bust(url) {
    return `${url}?_=${Date.now()}`;
  }

  function relativeTime(date) {
    if (!date) return "";
    const diff = Math.floor((Date.now() - date.getTime()) / 1000);
    if (diff < 5)  return "just now";
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    return `${Math.floor(diff / 3600)}h ago`;
  }

  function showToast(msg) {
    copyToast.textContent = msg;
    copyToast.classList.add("visible");
    setTimeout(() => copyToast.classList.remove("visible"), 1800);
  }

  // ── Session rendering ─────────────────────────────────────────────────────
  function renderSession() {
    const bar = document.querySelector(".session-bar");
    const state = getSessionState();
    const ageMin = currentSessionPing ? (Date.now() - currentSessionPing.getTime()) / 60000 : null;

    // Update bar state class
    bar.className = `session-bar state-${state}`;

    if (state === "none" || state === "ended") {
      sessionContent.innerHTML = `<div class="session-no-url">No active session</div>`;
      const badge = document.querySelector(".session-label");
      if (badge) badge.innerHTML = `<span class="session-state-badge"><span class="badge-dot"></span>No Session</span>`;
      return;
    }

    const stateText = state === "active" ? "Active" : `Idle · ${Math.round(ageMin)}m ago`;
    const nameHtml = currentSessionName
      ? `<div class="session-app-name">${escapeHtml(currentSessionName)}</div>`
      : "";
    const openBtnColor = state === "idle" ? "background:#f0b429;color:#000" : "";

    sessionContent.innerHTML = `
      ${nameHtml}
      <a class="session-url-link" href="${currentSessionUrl}" id="sessionLink">${currentSessionUrl}</a>
      <div class="session-actions">
        <button class="btn-sm btn-copy" id="btnCopy">Copy</button>
        <a class="btn-sm btn-open" href="${currentSessionUrl}" id="btnOpen" style="${openBtnColor}">Open in Claude ↗</a>
        <span class="session-age">${stateText}</span>
      </div>
    `;

    document.getElementById("btnCopy").addEventListener("click", () => {
      navigator.clipboard.writeText(currentSessionUrl).then(() => showToast("Copied!")).catch(() => {
        // Fallback for older iOS
        const ta = document.createElement("textarea");
        ta.value = currentSessionUrl;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showToast("Copied!");
      });
    });
  }

  // Re-render session state every 60s so Idle timer and state transitions update live
  setInterval(() => {
    if (currentSessionUrl) {
      renderSession();
      if (lastApps) renderApps(lastApps);
    }
  }, 60_000);

  // ── Session fetching ──────────────────────────────────────────────────────
  async function fetchSession() {
    try {
      const [urlRes, nameRes, pingRes] = await Promise.all([
        fetch(bust(`${RAW_BASE}/${SESSION_URL_FILE}`), { cache: "no-store" }),
        fetch(bust(`${RAW_BASE}/${SESSION_NAME_FILE}`), { cache: "no-store" }),
        fetch(bust(`${RAW_BASE}/${SESSION_PING_FILE}`), { cache: "no-store" }),
      ]);

      if (!urlRes.ok) return;
      const url = (await urlRes.text()).trim();

      // Empty URL means session was cleared (Stop hook or session-end.sh ran)
      if (!url) {
        currentSessionUrl  = null;
        currentSessionName = null;
        currentSessionPing = null;
        renderSession();
        if (lastApps) renderApps(lastApps);
        return;
      }

      if (nameRes.ok) {
        const name = (await nameRes.text()).trim();
        if (name) currentSessionName = name;
      }

      if (pingRes.ok) {
        const pingStr = (await pingRes.text()).trim();
        if (pingStr) {
          const parsed = new Date(pingStr);
          if (!isNaN(parsed)) currentSessionPing = parsed;
        }
      }

      const isNew = url !== currentSessionUrl;
      currentSessionUrl = url;
      sessionFetchedAt  = new Date();

      if (isNew && waitingForSession) {
        clearWaiting();
      }

      renderSession();
      if (lastApps) renderApps(lastApps); // refresh active card highlight
    } catch (_) { /* network error — ignore */ }
  }

  function startSessionPolling() {
    clearInterval(sessionPollTimer);
    sessionPollTimer = setInterval(fetchSession, 4_000);
    fetchSession();
  }

  // ── Waiting state (after Launch tap) ─────────────────────────────────────
  function startWaiting(appCard) {
    waitingForSession = true;
    sessionWaiting.classList.add("active");

    // Auto-clear after 30s
    waitingTimeout = setTimeout(() => clearWaiting(), 30_000);

    // Poll every 1.5s while waiting
    clearInterval(sessionPollTimer);
    sessionPollTimer = setInterval(fetchSession, 1_500);
  }

  function clearWaiting() {
    waitingForSession = false;
    sessionWaiting.classList.remove("active");
    clearTimeout(waitingTimeout);
    // Return to normal polling
    startSessionPolling();
  }

  // ── App list ──────────────────────────────────────────────────────────────
  async function fetchApps() {
    try {
      const [appsRes, summariesRes] = await Promise.all([
        fetch(bust(`${RAW_BASE}/${APPS_FILE}`), { cache: "no-store" }),
        fetch(bust(`${RAW_BASE}/${SUMMARIES_FILE}`), { cache: "no-store" }),
      ]);

      if (!appsRes.ok) {
        appsGrid.innerHTML = `<div class="state-message">apps.json not found in Gist.<br>Run export-apps.sh first.</div>`;
        return;
      }

      if (summariesRes.ok) {
        try { summaries = await summariesRes.json(); } catch (_) {}
      }

      const apps = await appsRes.json();
      lastApps = apps;
      renderApps(apps);
    } catch (e) {
      appsGrid.innerHTML = `<div class="state-message">Failed to load apps: ${e.message}</div>`;
    }
  }

  function renderApps(apps) {
    if (!apps.length) {
      appsLabel.style.display = "none";
      appsGrid.innerHTML = `<div class="state-message">No Claude Code apps found.<br>Enable Claude Code in App Manager, then run export-apps.sh.</div>`;
      return;
    }

    appsLabel.style.display = "";
    appsGrid.innerHTML = apps.map(app => {
      const star = app.favorite ? `<span class="app-star">★</span>` : "";
      const normStr = s => s.replace(/[\u2018\u2019\u201A\u201B]/g, "'").toLowerCase().trim();
      const state = getSessionState();
      const isMatchingSession = currentSessionName &&
        normStr(app.name) === normStr(currentSessionName) &&
        currentSessionUrl &&
        state !== "none" && state !== "ended";

      let btn;
      if (isMatchingSession && state === "active") {
        btn = `<a class="btn-launch btn-open-session" href="${currentSessionUrl}">Open Session ↗</a>`;
      } else if (isMatchingSession && state === "idle") {
        btn = `<a class="btn-launch btn-open-session" href="${currentSessionUrl}" style="background:#f0b429;color:#000">Open Session ↗ <span style="font-size:10px;opacity:0.8">(idle)</span></a>`;
      } else {
        btn = `<button class="btn-launch" disabled>No Session</button>`;
      }

      const s = summaries[app.id];
      const summaryPanel = s ? `
        <button class="btn-summary" onclick="toggleSummary('${app.id}')">
          <span id="chevron-${app.id}">▸</span> Details
        </button>
        <div class="summary-panel" id="summary-${app.id}">
          <div class="summary-text">${escapeHtml(s.summary || "")}</div>
          ${s.nextSteps && s.nextSteps.length ? `
            <ul class="summary-next-steps">
              ${s.nextSteps.map(step => `<li>${escapeHtml(step)}</li>`).join("")}
            </ul>` : ""}
          ${s.updated ? `<div class="summary-updated">Updated ${s.updated}</div>` : ""}
        </div>` : "";

      return `
        <div class="app-card${isMatchingSession ? (state === 'idle' ? ' card-idle' : ' card-active') : ''}" id="card-${app.id}">
          ${star}
          <div class="app-name">${escapeHtml(app.name)}</div>
          ${summaryPanel}
          ${btn}
        </div>
      `;
    }).join("");
  }

  function toggleSummary(id) {
    const panel = document.getElementById(`summary-${id}`);
    const chevron = document.getElementById(`chevron-${id}`);
    if (!panel) return;
    const open = panel.classList.toggle("open");
    chevron.textContent = open ? "▾" : "▸";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Launch ────────────────────────────────────────────────────────────────
  async function handleLaunch(btn) {
    if (!NTFY_TOPIC || !SECRET) {
      alert("NTFY_TOPIC and SECRET are not configured in this launcher.\nEdit launcher.html and set them before deploying.");
      return;
    }

    const appId   = btn.dataset.id;
    const appName = btn.dataset.name;
    const card    = document.getElementById(`card-${appId}`);
    const ls      = document.getElementById(`ls-${appId}`);

    btn.disabled  = true;
    card.classList.add("launching");
    ls.textContent = "Sending…";

    const body = `${SECRET}:${appId}`;

    try {
      const res = await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain",
          "Title": `Launch: ${appName}`,
        },
        body,
      });

      if (res.ok) {
        ls.textContent = "Sent ✓ — waiting…";
        startWaiting(card);
      } else {
        ls.textContent = `Error ${res.status}`;
      }
    } catch (e) {
      ls.textContent = `Network error`;
    }

    // Re-enable button after 5s regardless
    setTimeout(() => {
      btn.disabled = false;
      card.classList.remove("launching");
      if (!waitingForSession) ls.textContent = "";
    }, 5_000);
  }

  // ── PIN Gate ──────────────────────────────────────────────────────────────
  const PIN_HASH = "75567d38a76f47b166203e501c6faf4cb513e049bb5169a1f65b0084d1067cfc";

  async function checkPin() {
    const pin = document.getElementById("pinInput").value.trim();
    if (!pin) return;
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    if (hex === PIN_HASH) {
      sessionStorage.setItem("unlocked", "1");
      document.getElementById("pinOverlay").remove();
      startSessionPolling();
      fetchApps();
    } else {
      const box = document.querySelector(".pin-box");
      const err = document.getElementById("pinError");
      err.style.display = "block";
      box.classList.remove("pin-shake");
      void box.offsetWidth; // reflow to restart animation
      box.classList.add("pin-shake");
      document.getElementById("pinInput").value = "";
      document.getElementById("pinInput").focus();
    }
  }

  // Allow pressing Enter in PIN field
  document.getElementById("pinInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPin();
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  if (sessionStorage.getItem("unlocked") === "1") {
    document.getElementById("pinOverlay").remove();
    startSessionPolling();
    fetchApps();
  }
  // else: wait for PIN — polling starts only after unlock
</script>
</body>
</html>
