<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claude Launcher</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #1a1a1f;
      --surface2: #24242b;
      --border: #2e2e38;
      --accent: #7c6af7;
      --accent-dim: #4a4270;
      --text: #e8e8f0;
      --text-dim: #888899;
      --green: #4caf7d;
      --red: #e05c5c;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 18px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Sessions bar ── */
    .sessions-bar {
      margin: 0 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: var(--radius);
      padding: 12px 16px;
      transition: border-color 0.3s;
    }

    .sessions-bar.has-active { border-left-color: var(--green); }
    .sessions-bar.has-idle   { border-left-color: #f0b429; }
    .sessions-bar.has-none   { border-left-color: var(--border); }

    .sessions-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .session-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .session-row:last-child { border-bottom: none; }

    .session-row-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .session-row-name {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      line-height: 1.2;
    }

    .session-row-age {
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .session-row-open {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 7px;
      border: 1px solid var(--accent-dim);
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .session-row-open:active { opacity: 0.7; }

    .session-none-msg {
      font-size: 14px;
      color: var(--text-dim);
    }

    /* Waiting indicator */
    .session-waiting {
      display: none;
      font-size: 12px;
      color: var(--accent);
      margin-top: 8px;
    }

    .session-waiting.active { display: flex; align-items: center; gap: 6px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App grid ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      padding: 0 12px 32px;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .app-card.launching {
      border-color: var(--accent-dim);
    }

    .app-star {
      position: absolute;
      top: 10px; right: 10px;
      font-size: 13px;
      color: #f0b429;
    }

    .app-name {
      font-size: 15px;
      font-weight: 600;
      padding-right: 18px;
      line-height: 1.2;
    }

    .app-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .app-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .app-status-dot.active { background: var(--green); }
    .app-status-dot.paused { background: #f0b429; }
    .app-status-dot.idea   { background: var(--text-dim); }

    .btn-launch {
      margin-top: auto;
      width: 100%;
      padding: 9px 0;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn-launch:disabled {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
      cursor: default;
      font-weight: 600;
    }

    .btn-launch:not(:disabled):active { opacity: 0.75; }

    .btn-open-session {
      display: block;
      text-align: center;
      text-decoration: none;
      background: var(--green);
    }

    .card-active { border-color: var(--green); }
    .card-idle   { border-color: #f0b429; }

    /* ── Summary panel ── */
    .btn-summary {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-summary:active { opacity: 0.6; }

    .summary-panel {
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 2px;
    }

    .summary-panel.open { display: block; }

    .summary-text {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .summary-next-steps {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .summary-next-steps li {
      font-size: 11px;
      color: var(--text);
      padding-left: 12px;
      position: relative;
      line-height: 1.4;
    }

    .summary-next-steps li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .summary-updated {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      opacity: 0.7;
    }

    /* Checking state (shown before first sessions fetch completes) */
    .checking-badge {
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 8px;
    }

    /* Launch state */
    .launch-status {
      font-size: 11px;
      color: var(--accent);
      text-align: center;
      min-height: 16px;
    }

    /* Empty / error states */
    .state-message {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    .copy-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 100;
    }

    .copy-toast.visible { opacity: 1; }

    /* ── PIN overlay ── */
    #pinOverlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .pin-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 240px;
    }

    .pin-box h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    #pinInput {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 8px;
      text-align: center;
      outline: none;
    }

    #pinInput:focus { border-color: var(--accent); }

    #pinSubmit {
      width: 100%;
      padding: 12px 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: opacity 0.15s;
    }

    #pinSubmit:active { opacity: 0.75; }

    #pinError {
      font-size: 13px;
      color: var(--red);
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .pin-shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<!-- PIN overlay -->
<div id="pinOverlay">
  <div class="pin-box">
    <h2>Claude Launcher</h2>
    <input type="password" inputmode="numeric" maxlength="6" id="pinInput" placeholder="••••" autofocus />
    <button id="pinSubmit" onclick="checkPin()">Unlock</button>
    <div id="pinError">Wrong PIN — try again</div>
  </div>
</div>

<header>
  <div class="dot"></div>
  <h1>Claude Launcher</h1>
</header>

<!-- Sessions bar (rendered by JS) -->
<div id="sessionsBar"></div>

<!-- App list -->
<div class="section-label" id="appsLabel" style="display:none">Apps</div>
<div class="apps-grid" id="appsGrid">
  <div class="state-message">Loading apps…</div>
</div>

<div class="copy-toast" id="copyToast">Copied!</div>

<script>
  // ── Configuration ─────────────────────────────────────────────────────────
  const GIST_USER  = "nl4444";
  const GIST_ID    = "84420b55ed8c8eed82660b5a3803b271";
  const NTFY_TOPIC = "claude-launcher-0b708e1e";
  const SECRET     = "6838d77aed4681a5";

  const RAW_BASE       = `https://gist.githubusercontent.com/${GIST_USER}/${GIST_ID}/raw`;
  const SESSIONS_FILE  = "sessions.json";
  const APPS_FILE      = "apps.json";
  const SUMMARIES_FILE = "summaries.json";

  // Session staleness thresholds (minutes)
  const IDLE_THRESHOLD  = 20;   // > 20 min → Idle
  const ENDED_THRESHOLD = 480;  // > 8 hr  → treat as stale/ended

  // ── State ─────────────────────────────────────────────────────────────────
  let sessions      = {};  // { appId: { name, path, url, ping } }
  let lastApps      = null;
  let summaries     = {};
  let pollTimer     = null;
  let isInitialLoad = true;  // true until first fetchSessions() resolves

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const sessionsBar = document.getElementById("sessionsBar");
  const appsGrid    = document.getElementById("appsGrid");
  const appsLabel   = document.getElementById("appsLabel");
  const copyToast   = document.getElementById("copyToast");

  // ── Utilities ─────────────────────────────────────────────────────────────
  function bust(url) { return `${url}?_=${Date.now()}`; }

  function relativeTime(isoStr) {
    if (!isoStr) return "";
    const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
    if (diff < 5)    return "just now";
    if (diff < 60)   return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    return `${Math.floor(diff / 3600)}h ago`;
  }

  // Returns "active" | "idle" | "ended" | "none" for a sessions.json entry
  function getEntryState(entry) {
    if (!entry || !entry.url) return "none";
    if (!entry.ping) return "idle";
    const ageMin = (Date.now() - new Date(entry.ping).getTime()) / 60000;
    if (ageMin > ENDED_THRESHOLD) return "ended";
    if (ageMin > IDLE_THRESHOLD)  return "idle";
    return "active";
  }

  function showToast(msg) {
    copyToast.textContent = msg;
    copyToast.classList.add("visible");
    setTimeout(() => copyToast.classList.remove("visible"), 1800);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Sessions bar rendering ─────────────────────────────────────────────────
  function renderSessionsBar() {
    // Only show entries that are active or idle (not stale/ended)
    const alive = Object.entries(sessions).filter(([, e]) => {
      const s = getEntryState(e);
      return s === "active" || s === "idle";
    });

    if (!alive.length) {
      sessionsBar.innerHTML = `
        <div class="sessions-bar has-none">
          <div class="sessions-label">Sessions</div>
          <div class="session-none-msg">No active sessions</div>
        </div>`;
      return;
    }

    // Determine bar accent: active > idle
    const hasActive = alive.some(([, e]) => getEntryState(e) === "active");
    const barClass  = hasActive ? "has-active" : "has-idle";
    const label     = `${alive.length} Active Session${alive.length > 1 ? "s" : ""}`;

    const rows = alive.map(([id, e]) => {
      const state    = getEntryState(e);
      const dotColor = state === "active" ? "var(--green)" : "#f0b429";
      const age      = relativeTime(e.ping);

      return `
        <div class="session-row">
          <span class="session-row-dot" style="background:${dotColor}"></span>
          <span class="session-row-name">${escapeHtml(e.name || id)}</span>
          ${age ? `<span class="session-row-age">${age}</span>` : ""}
          <a class="session-row-open" href="${e.url}">Open ↗</a>
        </div>`;
    }).join("");

    sessionsBar.innerHTML = `
      <div class="sessions-bar ${barClass}">
        <div class="sessions-label">${label}</div>
        ${rows}
      </div>`;
  }

  // ── Sessions fetching ─────────────────────────────────────────────────────
  async function fetchSessions() {
    try {
      const res = await fetch(bust(`${RAW_BASE}/${SESSIONS_FILE}`), { cache: "no-store" });
      if (res.ok) {
        const data = await res.json();
        sessions = data || {};
      } else {
        sessions = {};
      }
    } catch (_) {
      sessions = {};
    }
    // First fetch done — resolve checking state
    isInitialLoad = false;
    renderSessionsBar();
    if (lastApps) renderApps(lastApps);
  }

  function startSessionPolling() {
    clearInterval(pollTimer);
    pollTimer = setInterval(fetchSessions, 4_000);
    fetchSessions();
  }

  // Re-render every 60s so age labels stay fresh
  setInterval(() => {
    renderSessionsBar();
    if (lastApps) renderApps(lastApps);
  }, 60_000);

  // ── App list ──────────────────────────────────────────────────────────────
  async function fetchApps() {
    try {
      const [appsRes, summariesRes] = await Promise.all([
        fetch(bust(`${RAW_BASE}/${APPS_FILE}`), { cache: "no-store" }),
        fetch(bust(`${RAW_BASE}/${SUMMARIES_FILE}`), { cache: "no-store" }),
      ]);

      if (!appsRes.ok) {
        appsGrid.innerHTML = `<div class="state-message">apps.json not found in Gist.<br>Run export-apps.sh first.</div>`;
        return;
      }

      if (summariesRes.ok) {
        try { summaries = await summariesRes.json(); } catch (_) {}
      }

      const apps = await appsRes.json();
      lastApps = apps;
      renderApps(apps);
    } catch (e) {
      appsGrid.innerHTML = `<div class="state-message">Failed to load apps: ${e.message}</div>`;
    }
  }

  function renderApps(apps) {
    if (!apps.length) {
      appsLabel.style.display = "none";
      appsGrid.innerHTML = `<div class="state-message">No Claude Code apps found.<br>Enable Claude Code in App Manager, then run export-apps.sh.</div>`;
      return;
    }

    appsLabel.style.display = "";
    appsGrid.innerHTML = apps.map(app => {
      const star  = app.favorite ? `<span class="app-star">★</span>` : "";
      const entry = sessions[app.id];
      const state = getEntryState(entry);

      let btn;
      if (isInitialLoad) {
        btn = `<span class="checking-badge">⏳ Checking...</span>`;
      } else if (state === "active") {
        btn = `<a class="btn-launch btn-open-session" href="${entry.url}">Open Session ↗</a>`;
      } else if (state === "idle") {
        btn = `<a class="btn-launch btn-open-session" href="${entry.url}" style="background:#f0b429;color:#000">Open Session ↗ <span style="font-size:10px;opacity:0.8">(idle)</span></a>`;
      } else {
        btn = `<button class="btn-launch" disabled>No Session</button>`;
      }

      const cardBorder = isInitialLoad ? "" : (state === "active" ? " card-active" : state === "idle" ? " card-idle" : "");

      const s = summaries[app.id];
      const summaryPanel = s ? `
        <button class="btn-summary" onclick="toggleSummary('${app.id}')">
          <span id="chevron-${app.id}">▸</span> Details
        </button>
        <div class="summary-panel" id="summary-${app.id}">
          <div class="summary-text">${escapeHtml(s.summary || "")}</div>
          ${s.nextSteps && s.nextSteps.length ? `
            <ul class="summary-next-steps">
              ${s.nextSteps.map(step => `<li>${escapeHtml(step)}</li>`).join("")}
            </ul>` : ""}
          ${s.updated ? `<div class="summary-updated">Updated ${s.updated}</div>` : ""}
        </div>` : "";

      return `
        <div class="app-card${cardBorder}" id="card-${app.id}">
          ${star}
          <div class="app-name">${escapeHtml(app.name)}</div>
          ${summaryPanel}
          ${btn}
        </div>`;
    }).join("");
  }

  function toggleSummary(id) {
    const panel   = document.getElementById(`summary-${id}`);
    const chevron = document.getElementById(`chevron-${id}`);
    if (!panel) return;
    const open = panel.classList.toggle("open");
    chevron.textContent = open ? "▾" : "▸";
  }

  // ── PIN Gate ──────────────────────────────────────────────────────────────
  const PIN_HASH = "75567d38a76f47b166203e501c6faf4cb513e049bb5169a1f65b0084d1067cfc";

  async function checkPin() {
    const pin = document.getElementById("pinInput").value.trim();
    if (!pin) return;
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    if (hex === PIN_HASH) {
      sessionStorage.setItem("unlocked", "1");
      document.getElementById("pinOverlay").remove();
      startSessionPolling();
      fetchApps();
    } else {
      const box = document.querySelector(".pin-box");
      const err = document.getElementById("pinError");
      err.style.display = "block";
      box.classList.remove("pin-shake");
      void box.offsetWidth;
      box.classList.add("pin-shake");
      document.getElementById("pinInput").value = "";
      document.getElementById("pinInput").focus();
    }
  }

  document.getElementById("pinInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPin();
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  if (sessionStorage.getItem("unlocked") === "1") {
    document.getElementById("pinOverlay").remove();
    startSessionPolling();
    fetchApps();
  }
  // else: wait for PIN
</script>
</body>
</html>
